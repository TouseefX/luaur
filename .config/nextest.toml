# nextest configuration.
#
# SAFETY NET against runaway / infinite-loop tests. On 2026-06-16 three parser
# tests (parse_compound_assignment_error_*) infinite-looped while allocating
# memory; run 12-wide by nextest's default they exhausted 32GB RAM and kernel-
# panicked the machine. The underlying parser bug is fixed, but this timeout
# auto-kills ANY future test that won't terminate, before it can OOM the box.
#
# Normal tests here run in well under 1s, so a 5s "slow" warning + termination
# at 2x (10s) has an enormous margin and won't false-positive on legit tests.

[profile.default]
# Run the whole suite even when tests fail — we want the full failure list, not
# an early bail on the first failure.
fail-fast = false
# Flag a test as slow after 5s; SIGTERM then SIGKILL it after 2 periods (10s).
slow-timeout = { period = "5s", terminate-after = 2 }

# Conservative parallelism while we harden the suite — leaves memory headroom so
# that even if several future tests misbehave at once they can't sum to an OOM.
# Bump back toward num-cpus once the suite is known-clean.
test-threads = 6

# A separate, stricter profile for hunting runaways: serial + short kill, so a
# new infinite-loop test is caught in seconds with zero risk.
# Use with: cargo nextest run --profile hunt
[profile.hunt]
slow-timeout = { period = "3s", terminate-after = 1 }
test-threads = 1
fail-fast = false
