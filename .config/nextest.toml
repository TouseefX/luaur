# nextest configuration.
#
# SAFETY NET against runaway / infinite-loop tests. On 2026-06-16 three parser
# tests (parse_compound_assignment_error_*) infinite-looped while allocating
# memory; run 12-wide by nextest's default they exhausted 32GB RAM and kernel-
# panicked the machine. The underlying parser bug is fixed, but this timeout
# auto-kills ANY future test that won't terminate, before it can OOM the box.
#
# Most tests run in well under 1s, but a handful of deep-recursion type-checker /
# conformance tests legitimately take 10-25s on slower CI runners. Flag slow at
# 15s and SIGTERM/SIGKILL after 2 periods (30s): a true infinite loop still dies
# long before it can OOM the box, but a genuinely slow test is not killed.

[profile.default]
# Run the whole suite even when tests fail — we want the full failure list, not
# an early bail on the first failure.
fail-fast = false
slow-timeout = { period = "15s", terminate-after = 2 }

# Conservative parallelism while we harden the suite — leaves memory headroom so
# that even if several future tests misbehave at once they can't sum to an OOM.
# Bump back toward num-cpus once the suite is known-clean.
test-threads = 6

# A few stress tests legitimately exceed the 30s global kill on slower CI runners
# (the GitHub macOS/ubuntu hosts): the udtf areequal test builds a 50_000-deep
# table in the debug type-function VM, and some conformance scripts run real Lua
# workloads. Give them a generous ceiling without weakening the global anti-OOM
# net for everything else — they still terminate well inside it.
[[profile.default.overrides]]
filter = 'test(type_function_user_udtf_areequal_stack_overflow_on_deep_types) | package(luaur-conformance)'
slow-timeout = { period = "60s", terminate-after = 3 }

# A separate, stricter profile for hunting runaways: serial + short kill, so a
# new infinite-loop test is caught in seconds with zero risk.
# Use with: cargo nextest run --profile hunt
[profile.hunt]
slow-timeout = { period = "3s", terminate-after = 1 }
test-threads = 1
fail-fast = false
